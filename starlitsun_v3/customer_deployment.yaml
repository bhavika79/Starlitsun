apiVersion: apps/v1
kind: Deployment
metadata: 
  name: starlitsun-deployment
  labels:
    app: customerportal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customerportal
  template:
    metadata: 
      labels:
        app: customerportal
    spec: 
      containers:
        - name: customerportal
          image: bhavika79/starlitsun_app:v3
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: starlitsun-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: starlitsun-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: starlitsun-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: starlitsun-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: starlitsun-secret
                  key: DB_PASSWORD
          
