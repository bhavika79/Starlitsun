apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deployment
  labels:
    app: adminportal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adminportal
  template:
    metadata:
      labels:
        app: adminportal
    spec:
      containers:
        - name: adminportal
          image: bhavika79/starlitsun_adminportal:v4
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: starlitsun-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: starlitsun-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: starlitsun-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: starlitsun-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: starlitsun-secret
                  key: DB_PASSWORD